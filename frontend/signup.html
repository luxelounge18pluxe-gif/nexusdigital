<!doctype html>
<html>
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width,initial-scale=1">
  <title>Sign up</title>
  <script src="https://cdn.tailwindcss.com/3.4.17"></script>
</head>
<body class="flex items-center justify-center h-screen" style="background:linear-gradient(135deg,#0f1117 0%,#1a1d27 100%)">
  <div class="w-full max-w-md p-6 rounded-lg" style="background:var(--surface);--surface:#1a1d27;color:#e2e4ea">
    <h2 class="text-xl font-semibold mb-4">Create account</h2>
    <div class="space-y-3">
      <input id="name" placeholder="Full name" class="w-full px-3 py-2 rounded bg-transparent border border-gray-700" />
      <input id="email" placeholder="Email" class="w-full px-3 py-2 rounded bg-transparent border border-gray-700" />
      <div class="relative">
        <input id="password" type="password" placeholder="Password" class="w-full px-3 py-2 rounded bg-transparent border border-gray-700 pr-10" />
        <button type="button" onclick="togglePassword('password', 'togglePasswordBtn')" class="absolute right-3 top-1/2 -translate-y-1/2 text-gray-400 hover:text-white">
          <svg id="togglePasswordBtn" class="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M15 12a3 3 0 11-6 0 3 3 0 016 0z"/><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M2.458 12C3.732 7.943 7.523 5 12 5c4.478 0 8.268 2.943 9.542 7-1.274 4.057-5.064 7-9.542 7-4.477 0-8.268-2.943-9.542-7z"/></svg>
        </button>
      </div>
      <div class="relative">
        <input id="confirmPassword" type="password" placeholder="Confirm password" class="w-full px-3 py-2 rounded bg-transparent border border-gray-700 pr-10" />
        <button type="button" onclick="togglePassword('confirmPassword', 'toggleConfirmPasswordBtn')" class="absolute right-3 top-1/2 -translate-y-1/2 text-gray-400 hover:text-white">
          <svg id="toggleConfirmPasswordBtn" class="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M15 12a3 3 0 11-6 0 3 3 0 016 0z"/><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M2.458 12C3.732 7.943 7.523 5 12 5c4.478 0 8.268 2.943 9.542 7-1.274 4.057-5.064 7-9.542 7-4.477 0-8.268-2.943-9.542-7z"/></svg>
        </button>
      </div>
      <button id="signupBtn" class="w-full px-4 py-2 rounded text-white" style="background:#6c5ce7">Sign up</button>
      <button id="googleBtn" class="w-full mt-2 px-4 py-2 rounded border flex items-center justify-center gap-2" style="background:transparent;color:var(--text);border-color:rgba(255,255,255,0.06)">
        <svg width="18" height="18" viewBox="0 0 24 24" fill="none" xmlns="http://www.w3.org/2000/svg"><path d="M21.35 11.1H12v2.8h5.35c-.23 1.2-1 2.2-2.15 2.88v2.4h3.48C20.6 18.1 22 15.9 22 13c0-.73-.08-1.44-.22-2.1z" fill="#4285F4"/><path d="M12 22c2.7 0 4.95-.9 6.6-2.46l-3.48-2.4c-.95.64-2.16 1.02-3.12 1.02-2.4 0-4.44-1.62-5.17-3.8H3.22v2.38C4.86 19.9 8.17 22 12 22z" fill="#34A853"/><path d="M6.83 13.36A6.002 6.002 0 0 1 6.5 12c0-.4.06-.8.15-1.16V8.45H3.22A9.996 9.996 0 0 0 2 12c0 1.6.36 3.12 1.01 4.46l3.82-3.1z" fill="#FBBC05"/><path d="M12 6.5c1.46 0 2.78.5 3.82 1.48l2.86-2.86C16.95 3.38 14.7 2.5 12 2.5 8.17 2.5 4.86 4.6 3.22 7.62l3.48 2.38C7.56 8.12 9.6 6.5 12 6.5z" fill="#EA4335"/></svg>
        Continue with Google
      </button>
      <div class="flex items-center gap-2">
        <input id="agreePrivacy" type="checkbox" class="rounded" />
        <label for="agreePrivacy" class="text-sm opacity-70">I agree to the <a href="privacy.html" class="text-blue-400">Privacy Policy</a> and <a href="privacy.html#terms" class="text-blue-400">Terms</a></label>
      </div>
      <p class="text-sm opacity-70">Already have an account? <a href="signin.html" class="text-blue-400">Sign in</a></p>
    </div>
    <div id="msg" class="mt-3 text-sm"></div>
  </div>

<script>
function togglePassword(inputId, btnId) {
  const input = document.getElementById(inputId);
  const btn = document.getElementById(btnId);
  if (input.type === 'password') {
    input.type = 'text';
    btn.innerHTML = '<path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M13.875 18.825A10.05 10.05 0 0112 19c-4.478 0-8.268-2.943-9.543-7a9.97 9.97 0 011.563-3.029m5.858.908a3 3 0 114.243 4.243M9.878 9.878l4.242 4.242M9.88 9.88l-3.29-3.29m7.532 7.532l3.29 3.29M3 3l3.59 3.59m0 0A9.953 9.953 0 0112 5c4.478 0 8.268 2.943 9.543 7a10.025 10.025 0 01-4.132 5.411m0 0L21 21"/>';
  } else {
    input.type = 'password';
    btn.innerHTML = '<path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M15 12a3 3 0 11-6 0 3 3 0 016 0z"/><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M2.458 12C3.732 7.943 7.523 5 12 5c4.478 0 8.268 2.943 9.542 7-1.274 4.057-5.064 7-9.542 7-4.477 0-8.268-2.943-9.542-7z"/>';
  }
}

async function postJSON(url, body) {
  const res = await fetch(url, { method: 'POST', headers: { 'Content-Type':'application/json' }, body: JSON.stringify(body) });
  return res.json().then(j => ({ ok: res.ok, status: res.status, body: j })).catch(e => ({ ok:false, status:0, body:{error: e.message} }));
}

function showMsg(txt, ok=true) {
  const el = document.getElementById('msg');
  el.textContent = txt; el.style.color = ok ? '#86efac' : '#fca5a5';
}

document.getElementById('signupBtn').addEventListener('click', async () => {
  const name = document.getElementById('name').value.trim();
  const email = document.getElementById('email').value.trim();
  const password = document.getElementById('password').value;
  const confirmPassword = document.getElementById('confirmPassword').value;
  const agrees = document.getElementById('agreePrivacy') && document.getElementById('agreePrivacy').checked;
  if (!agrees) return showMsg('You must agree to the Privacy Policy and Terms', false);
  if (!name) return showMsg('Name is required', false);
  if (!email || !password) return showMsg('Email and password required', false);
  if (password !== confirmPassword) return showMsg('Passwords do not match', false);
  if (password.length < 6) return showMsg('Password must be at least 6 characters', false);
  const r = await postJSON('/api/signup', { name, email, password });
  if (!r.ok) return showMsg(r.body && r.body.error ? r.body.error : 'Sign up failed', false);
  // store token locally
  localStorage.setItem('auth_token', r.body.token);
  localStorage.setItem('auth_user', JSON.stringify(r.body.user));
  showMsg('Account created — redirected', true);
  setTimeout(() => window.location.href = '/signin.html', 900);
});

// Simulated Google sign-in (placeholder)
const googleBtn = document.getElementById('googleBtn');
if (googleBtn) {
  googleBtn.addEventListener('click', () => {
    showMsg('Google sign-in not configured; simulating login...', true);
    const dummyUser = { id: 'g_' + Date.now(), name: 'Google User', email: 'user@gmail.com' };
    localStorage.setItem('auth_token', 'google_dummy_token_' + Date.now());
    localStorage.setItem('auth_user', JSON.stringify(dummyUser));
    setTimeout(() => { window.location.href = '/ai tool.html'; }, 800);
  });
}
</script>
</body>
</html>
