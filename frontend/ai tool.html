<!doctype html>
<html lang="en" class="h-full">
 <head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>AI Tools Marketplace</title>
  <script src="https://cdn.tailwindcss.com/3.4.17"></script>
  <script src="https://cdn.jsdelivr.net/npm/lucide@0.263.0/dist/umd/lucide.min.js"></script>
  <link href="https://fonts.googleapis.com/css2?family=DM+Sans:wght@400;500;600;700&amp;display=swap" rel="stylesheet">
  <style>
* { font-family: 'DM Sans', sans-serif; }
html, body { height: 100%; margin: 0; }
.hide-scrollbar::-webkit-scrollbar { display: none; }
.hide-scrollbar { -ms-overflow-style: none; scrollbar-width: none; }
.card-hover { transition: transform 0.2s, box-shadow 0.2s; }
.card-hover:hover { transform: translateY(-3px); box-shadow: 0 8px 25px rgba(0,0,0,0.15); }
.cat-btn { transition: all 0.15s; }
.cat-btn.active { background: var(--primary); color: #fff; }
@keyframes fadeIn { from { opacity: 0; transform: translateY(10px); } to { opacity: 1; transform: translateY(0); } }
.animate-fade-in { animation: fadeIn 0.3s ease-out; }
</style>
  <style>body { box-sizing: border-box; }</style>
 </head>
 <body class="h-full text-gray-100 overflow-auto hide-scrollbar" style="background: linear-gradient(135deg, #0f1117 0%, #1a1d27 50%, #0a0e18 100%);">
  <div id="app" class="w-full h-full flex flex-col" style="--bg:#0f1117;--surface:#1a1d27;--text:#e2e4ea;--primary:#6c5ce7;--secondary:#a29bfe;"><!-- Header -->
   <header class="px-5 pt-5 pb-3 flex items-center justify-between flex-shrink-0">
    <div class="flex items-center gap-3">
     <button id="profileBtn" class="w-9 h-9 rounded-xl flex items-center justify-center hover:opacity-80 transition-all" style="background:var(--surface)"><i data-lucide="user" class="w-4 h-4" style="color:var(--secondary)"></i></button>
     <h1 id="pageTitle" class="text-sm font-bold" style="color:var(--text)">Hi</h1>
    </div>
    <div class="flex items-center gap-3">
     <div class="px-3 py-1.5 rounded-xl text-sm font-semibold" style="background:var(--surface);color:var(--primary)">
      $0.00
     </div><button id="settingsBtn" class="w-9 h-9 rounded-xl flex items-center justify-center hover:opacity-80 transition-all" style="background:var(--surface)"><i data-lucide="settings" class="w-4 h-4" style="color:var(--secondary)"></i></button><button id="logoutBtn" class="px-3 py-1.5 rounded-xl text-sm font-semibold" style="background:var(--surface);color:var(--primary)">Logout</button>
    </div>
   </header><!-- Categories -->
   <div class="px-5 pb-3 flex-shrink-0">
    <p class="text-xs font-semibold mb-2 opacity-50">Categories:</p>
    <div class="flex gap-2 flex-wrap" id="catContainer"><button class="cat-btn active px-3 py-1.5 rounded-lg text-xs font-medium" style="background:var(--surface);color:var(--secondary)" data-cat="All">All</button> <button class="cat-btn px-3 py-1.5 rounded-lg text-xs font-medium" style="background:var(--surface);color:var(--secondary)" data-cat="Web Builder">Web Builder</button> <button class="cat-btn px-3 py-1.5 rounded-lg text-xs font-medium" style="background:var(--surface);color:var(--secondary)" data-cat="Numbers">Numbers</button> <button class="cat-btn px-3 py-1.5 rounded-lg text-xs font-medium" style="background:var(--surface);color:var(--secondary)" data-cat="Design">Design</button> <button class="cat-btn px-3 py-1.5 rounded-lg text-xs font-medium" style="background:var(--surface);color:var(--secondary)" data-cat="Log">Log</button>
    </div>
   </div><!-- Tools Grid -->
   <div class="px-5 pb-5 flex-grow overflow-auto hide-scrollbar">
    <div id="toolsGrid" class="grid grid-cols-1 gap-3"></div>
    <p id="noResults" class="hidden text-center py-10 opacity-40 text-sm">No tools found</p>
    <div id="smsLogSection" class="hidden px-5 pb-5">
      <div style="background:var(--surface);border:1px solid rgba(255,255,255,0.08);" class="p-4 rounded-2xl">
        <div class="flex items-center justify-between mb-3">
          <div>
            <h2 class="text-sm font-semibold" style="color:var(--text)">SMS Log</h2>
            <p class="text-xs opacity-50">Messages from the number you bought in Design.</p>
          </div>
        </div>
        <div id="smsLogList" class="space-y-3">
          <p class="text-xs opacity-50">Select a Design tool to receive a message from the number you bought.</p>
        </div>
      </div>
    </div>
   </div>



  <script>
const tools = [];

// Load tools from localStorage on startup
function loadToolsFromStorage() {
  const stored = localStorage.getItem('aiToolsData');
  if (stored) {
    tools.length = 0;
    tools.push(...JSON.parse(stored));
  }
}

async function loadToolsFromAPI() {
  try {
    const response = await fetch('https://nexusbackend-vpu0.onrender.com/api/tools');
    if (response.ok) {
      const apiTools = await response.json();
      tools.length = 0;
      tools.push(...apiTools);
      localStorage.setItem('aiToolsData', JSON.stringify(apiTools));
      render();
    }
  } catch (error) {
    console.error('Failed to load tools from API:', error);
  }
}

let activeCat = "All";

function createCard(t) {
  const d = document.createElement('div');
  d.className = 'card-hover rounded-xl p-4 cursor-pointer';
  d.style.background = 'var(--surface)';
  const logoImg = t.logo ? `<img src="${t.logo}" alt="${t.name}" style="width:40px;height:40px;border-radius:6px;object-fit:cover;">` : `<div class="w-10 h-10 rounded-lg flex items-center justify-center" style="background:var(--primary)"><i data-lucide="${t.icon}" class="w-5 h-5 text-white"></i></div>`;
  d.innerHTML = `
    <div class="flex items-start justify-between mb-3">
      ${logoImg}
      <span class="text-xs font-medium px-2 py-0.5 rounded-full" style="background:rgba(108,92,231,0.15);color:var(--secondary)">${t.cat}</span>
    </div>
    <h3 class="font-semibold text-sm mb-1 leading-tight" style="color:var(--text)">${t.name}</h3>
    <div class="flex items-center gap-2 mb-2">
      <span class="text-xs font-bold" style="color:var(--primary)">${t.price}</span>
    </div>
    <p class="text-xs opacity-50 mb-3">${t.desc}</p>
    <div class="space-y-1">
      ${t.features.map(f=>`<p class="text-xs" style="color:var(--secondary)">✓ ${f}</p>`).join('')}
    </div>`;
  
  // Add click handler for payment - only for Web Builder and Design categories
  const paidCategories = ['Web Builder', 'Design'];
  if (paidCategories.includes(t.cat)) {
    d.addEventListener('click', () => showPaymentModal(t));
  }
  
  return d;
}

function showPaymentModal(tool) {
  const overlay = document.createElement('div');
  overlay.className = 'fixed inset-0 z-50 flex items-center justify-center p-4';
  overlay.style.background = 'rgba(0,0,0,0.7)';
  
  const box = document.createElement('div');
  box.className = 'rounded-2xl w-full max-w-sm p-5';
  box.style.background = 'var(--surface)';
  box.innerHTML = `
    <h3 class="text-lg font-semibold mb-2" style="color:var(--text)">Confirm Purchase</h3>
    <p class="text-sm mb-4" style="color:var(--secondary)">You are about to purchase:</p>
    <div class="p-3 rounded-lg mb-4" style="background:rgba(108,92,231,0.1)">
      <p class="font-semibold" style="color:var(--text)">${tool.name}</p>
      <p class="text-sm" style="color:var(--primary)">${tool.price}</p>
    </div>
    <p class="text-xs mb-4" style="color:var(--secondary)">Proceed to pay this amount?</p>
    <div class="flex gap-3">
      <button id="cancelPayBtn" class="flex-1 px-4 py-2 rounded-lg text-sm font-medium" style="background:rgba(255,255,255,0.06);color:var(--text)">Cancel</button>
      <button id="confirmPayBtn" class="flex-1 px-4 py-2 rounded-lg text-sm font-medium text-white" style="background:var(--primary)">Yes, Pay</button>
    </div>
  `;
  
  overlay.appendChild(box);
  document.body.appendChild(overlay);
  
  // Cancel button
  overlay.querySelector('#cancelPayBtn').addEventListener('click', () => overlay.remove());
  
  // Confirm payment button
  overlay.querySelector('#confirmPayBtn').addEventListener('click', async () => {
    // Show loading
    overlay.querySelector('#confirmPayBtn').textContent = 'Processing...';
    overlay.querySelector('#confirmPayBtn').disabled = true;
    
    try {
      const token = localStorage.getItem('auth_token');
      if (!token) {
        alert('Not authenticated');
        overlay.remove();
        return;
      }
      
      // Parse amount
      const amount = parseFloat(tool.price.replace('$', '').replace('/yr', ''));
      
      const response = await fetch('https://nexusbackend-vpu0.onrender.com/api/transactions', {
        method: 'POST',
        headers: {
          'Content-Type': 'application/json',
          'Authorization': `Bearer ${token}`
        },
        body: JSON.stringify({
          toolId: tool.id,
          amount: amount,
          quantity: 1
        })
      });
      
      if (!response.ok) {
        const error = await response.json();
        alert('Payment failed: ' + (error.error || 'Unknown error'));
        overlay.remove();
        return;
      }
      
      const transaction = await response.json();
      
      // Add to SMS log
      const logMessage = `Payment successful! You have purchased ${tool.name} for ${tool.price}. Transaction ID: ${transaction.id}`;
      addSmsLog('System', logMessage);
      
      // Show success
      box.innerHTML = `
        <div class="text-center py-4">
          <div class="w-16 h-16 rounded-full mx-auto mb-4 flex items-center justify-center" style="background:rgba(134,239,172,0.2)">
            <svg class="w-8 h-8" fill="none" stroke="#86efac" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M5 13l4 4L19 7"/></svg>
          </div>
          <h3 class="text-lg font-semibold mb-2" style="color:var(--text)">Payment Successful!</h3>
          <p class="text-sm mb-2" style="color:var(--secondary)">${tool.name} - ${tool.price}</p>
          <p class="text-xs" style="color:var(--secondary)">Transaction recorded</p>
        </div>
      `;
      
      // Auto close after 2 seconds
      setTimeout(() => overlay.remove(), 2500);
    } catch (error) {
      console.error('Payment error:', error);
      alert('Payment failed: Network error');
      overlay.remove();
    }
  });
  
  // Close on overlay click
  overlay.addEventListener('click', (e) => {
    if (e.target === overlay) overlay.remove();
  });
}

function render() {
  const grid = document.getElementById('toolsGrid');
  const nr = document.getElementById('noResults');
  grid.innerHTML = '';
  const filtered = tools.filter(t => {
    const catMatch = activeCat === 'All' || t.cat === activeCat;
    return catMatch;
  });
  if (activeCat === 'Log') {
    grid.innerHTML = '';
    nr.classList.add('hidden');
  } else {
    if (!filtered.length) { nr.classList.remove('hidden'); }
    else { nr.classList.add('hidden'); filtered.forEach(t => grid.appendChild(createCard(t))); }
  }
  lucide.createIcons();
  renderSmsLog();
}

function renderSmsLog() {
  const section = document.getElementById('smsLogSection');
  const list = document.getElementById('smsLogList');
  if (!section || !list) return;
  if (activeCat !== 'Log') {
    section.classList.add('hidden');
    return;
  }
  section.classList.remove('hidden');
  if (!smsLogs.length) {
    list.innerHTML = `<p class="text-xs opacity-50">Select a Design tool to receive a message from the number you bought.</p>`;
    return;
  }
  list.innerHTML = smsLogs.map(log => `
      <div style="background:rgba(255,255,255,0.04);border:1px solid rgba(255,255,255,0.08);" class="p-3 rounded-xl">
        <div class="text-[11px] uppercase tracking-[0.2em] opacity-50 mb-2">${log.time}</div>
        <p class="text-sm" style="color:var(--text)"><strong>SMS from ${log.number}</strong></p>
        <p class="text-xs opacity-70 mt-2">${log.message}</p>
      </div>
    `).join('');
}

function addSmsLog(number, message) {
  const time = new Date().toLocaleTimeString([], { hour: '2-digit', minute: '2-digit' });
  smsLogs.unshift({ number, message, time });
  renderSmsLog();
}

// Categories
document.getElementById('catContainer').addEventListener('click', e => {
  const btn = e.target.closest('[data-cat]');
  if (!btn) return;
  activeCat = btn.dataset.cat;
  document.querySelectorAll('.cat-btn').forEach(b => { b.classList.remove('active'); b.style.background='var(--surface)'; b.style.color='var(--secondary)'; });
  btn.classList.add('active');
  render();
});

// Country selection modal for Numbers section with flags

const smsLogs = [];

// Define price tiers

function getCountryPrice(countryCode) {
  if (europeanCountries.includes(countryCode) || americanCountries.includes(countryCode)) {
    return "$9.99";
  }
  return "$4.99";
}

function getFlagEmoji(code) {
  const codePoints = code
    .toUpperCase()
    .split('')
    .map(char => 127397 + char.charCodeAt());
  return String.fromCodePoint(...codePoints);
}

document.getElementById('toolsGrid').addEventListener('click', e => {
  const card = e.currentTarget.querySelector('[data-tool-name]');
  if (card) return;
  const toolCard = e.target.closest('.card-hover');
  if (!toolCard) return;
  
  const toolName = toolCard.querySelector('h3').textContent;
  const tool = tools.find(t => t.name === toolName);
  
  if (!tool) return;
  if (tool.cat === 'Numbers') {
    currentTool = tool;
    showCountryModal();
    return;
  }
  if (tool.cat === 'Design') {
    const boughtNumber = '+1 987-654-3210';
    addSmsLog(boughtNumber, 'You received an SMS from the number you bought.');
    const msgDiv = document.createElement('div');
    msgDiv.className = 'fixed bottom-5 right-5 z-50 bg-green-500 text-white px-4 py-3 rounded-lg shadow-lg flex items-center gap-2 animate-fade-in';
    msgDiv.innerHTML = `<i data-lucide="check-circle" class="w-5 h-5"></i><span>SMS log updated for Design tools. Check the SMS Log below.</span>`;
    document.body.appendChild(msgDiv);
    lucide.createIcons();
    setTimeout(() => msgDiv.remove(), 4000);
    return;
  }
});

function showCountryModal() {
  let modal = document.getElementById('countryModal');
  if (!modal) {
    modal = document.createElement('div');
    modal.id = 'countryModal';
    modal.className = 'fixed inset-0 z-50 flex items-center justify-center p-4';
    modal.style.background = 'rgba(0,0,0,0.7)';
    document.body.appendChild(modal);
  }
  
  modal.innerHTML = `
    <div class="bg-[#1a1d27] rounded-2xl w-full max-w-sm max-h-96 flex flex-col shadow-2xl border border-opacity-10" style="background:var(--surface);border-color:var(--primary)">
      <div class="px-5 py-4 border-b border-opacity-20 bg-gradient-to-r from-transparent to-[rgba(108,92,231,0.1)]" style="border-color:var(--secondary)">
        <h2 class="font-semibold text-base" style="color:var(--text)">Select Country for ${currentTool.name}</h2>
        <p class="text-xs opacity-50 mt-1">Choose your location to proceed</p>
      </div>
      <div id="countryList" class="flex-1 overflow-y-auto hide-scrollbar px-3 py-3 space-y-1"></div>
      <div class="px-5 py-3 border-t border-opacity-20 flex gap-2" style="border-color:var(--secondary)">
        <button id="cancelBtn" class="flex-1 px-4 py-2 rounded-lg text-sm font-medium transition-all hover:opacity-80" style="background:var(--surface);color:var(--secondary)">Cancel</button>
        <button id="confirmBtn" class="flex-1 px-4 py-2 rounded-lg text-sm font-medium text-white transition-all hover:opacity-90" style="background:var(--primary)">Confirm</button>
      </div>
    </div>`;
  
  const countryList = document.getElementById('countryList');
  let selectedCountry = null;
  let selectedCode = null;
  
  countryData.forEach(country => {
    const btn = document.createElement('button');
    btn.className = 'w-full text-left px-3 py-2.5 rounded-lg text-sm transition-all hover:opacity-80 flex items-center justify-between';
    const flag = getFlagEmoji(country.code);
    const price = getCountryPrice(country.code);
    btn.innerHTML = `<div class="flex items-center gap-2"><span class="text-lg">${flag}</span><span>${country.name}</span></div><span class="text-xs font-medium opacity-75">${price}</span>`;
    btn.style.color = 'var(--text)';
    btn.style.border = '1px solid transparent';
    btn.addEventListener('click', () => {
      document.querySelectorAll('#countryList button').forEach(b => {
        b.style.background = 'transparent';
        b.style.color = 'var(--text)';
        b.style.border = '1px solid transparent';
      });
      btn.style.background = 'var(--primary)';
      btn.style.color = 'white';
      btn.style.border = '1px solid rgba(255,255,255,0.25)';
      selectedCountry = country.name;
      selectedCode = country.code;
    });
    countryList.appendChild(btn);
  });
  
  document.getElementById('cancelBtn').addEventListener('click', () => modal.remove());
  document.getElementById('confirmBtn').addEventListener('click', () => {
    if (selectedCountry) {
      const price = getCountryPrice(selectedCode);

function checkAuth() {
  const token = localStorage.getItem('auth_token');
  const user = localStorage.getItem('auth_user');
  if (!token || !user) {
    window.location.href = 'signup.html';
    return false;
  }
  return true;
}

function logout() {
  localStorage.removeItem('auth_token');
  localStorage.removeItem('auth_user');

}

  formBox.innerHTML = `
    <div class="flex items-center justify-between mb-6">

      <button id="closeFormBtn" class="text-gray-400 hover:text-white"><i data-lucide="x" class="w-5 h-5"></i></button>

    <div class="space-y-4">
      <div style="background:rgba(108,92,231,0.1)" class="p-4 rounded-lg">

      </div>
      
      <div>

        <p style="color:var(--text)" class="text-xs">3. Click "I have made payment" when done</p>
      </div>
    </div>
    
    <div class="flex gap-2 mt-6">
      <button id="cancelPaymentForm" class="flex-1 px-4 py-2 rounded-lg text-sm font-medium transition-all hover:opacity-90" style="background:rgba(255,255,255,0.06);color:var(--text)">Cancel</button>
      <button id="confirmPaymentBtn" class="flex-1 px-4 py-2 rounded-lg text-sm font-medium text-white transition-all hover:opacity-90" style="background:var(--primary)">I have made payment</button>
    </div>
  `;
  
  formOverlay.appendChild(formBox);
  document.body.appendChild(formOverlay);
  
  formBox.querySelector('#copyAddressBtn').addEventListener('click', () => {
    navigator.clipboard.writeText(address).then(() => {
      showToast('Address copied to clipboard');
    });
  });
  
  formBox.querySelector('#closeFormBtn').addEventListener('click', () => formOverlay.remove());
  formBox.querySelector('#cancelPaymentForm').addEventListener('click', () => formOverlay.remove());
  
  formBox.querySelector('#confirmPaymentBtn').addEventListener('click', () => {
    const amount = formBox.querySelector('#paymentAmount').value.trim();
    
    if (!amount) {
      showToast('Please enter an amount', '#ef4444');
      return;
    }
    
    const numAmount = parseFloat(amount);
    if (numAmount <= 0) {
      showToast('Amount must be greater than 0', '#ef4444');
      return;
    }
    
    formOverlay.remove();
    showPaymentConfirmation(method, address, numAmount);
  });
  
  formOverlay.addEventListener('click', (e) => {
    if (e.target === formOverlay) formOverlay.remove();
  });
  
  lucide.createIcons();
}

function showPaymentConfirmation(method, address, amount) {
  const confirmOverlay = document.createElement('div');
  confirmOverlay.className = 'fixed inset-0 z-50 flex items-center justify-center p-4';
  confirmOverlay.style.background = 'rgba(0,0,0,0.7)';
  
  const confirmBox = document.createElement('div');
  confirmBox.className = 'rounded-2xl w-full max-w-md p-6';
  confirmBox.style.background = 'var(--surface)';
  confirmBox.innerHTML = `
    <div class="flex items-center justify-between mb-6">
      <h2 style="color:var(--text)" class="text-2xl font-semibold">Confirm Payment</h2>
      <button id="closeConfirmBtn" class="text-gray-400 hover:text-white"><i data-lucide="x" class="w-5 h-5"></i></button>
    </div>
    
    <div style="background:rgba(108,92,231,0.1)" class="p-4 rounded-lg mb-4">
      <div class="flex justify-between mb-2">
        <p style="color:var(--secondary)" class="text-xs">Payment Method:</p>
        <p style="color:var(--text)" class="text-sm font-semibold">${method}</p>
      </div>
      <div class="flex justify-between">
        <p style="color:var(--secondary)" class="text-xs">Amount:</p>
        <p style="color:var(--text)" class="text-sm font-semibold">$${amount}</p>
      </div>
    </div>
    
    <div style="background:rgba(108,92,231,0.05);border:1px solid rgba(108,92,231,0.2)" class="p-3 rounded-lg mb-4">
      <p style="color:var(--text)" class="text-xs mb-2"><strong>⏳ Pending Confirmation</strong></p>
      <p style="color:var(--secondary)" class="text-xs">Your payment is being processed. An admin will confirm the transaction and it will appear on your dashboard soon.</p>
    </div>
    
    <div class="flex gap-2">
      <button id="cancelConfirmBtn" class="flex-1 px-4 py-2 rounded-lg text-sm font-medium transition-all hover:opacity-90" style="background:rgba(255,255,255,0.06);color:var(--text)">Cancel</button>
      <button id="submitPaymentBtn" class="flex-1 px-4 py-2 rounded-lg text-sm font-medium text-white transition-all hover:opacity-90" style="background:var(--primary)">Submit</button>
    </div>
  `;
  
  confirmOverlay.appendChild(confirmBox);
  document.body.appendChild(confirmOverlay);
  
  confirmBox.querySelector('#closeConfirmBtn').addEventListener('click', () => confirmOverlay.remove());
  confirmBox.querySelector('#cancelConfirmBtn').addEventListener('click', () => confirmOverlay.remove());
  
  confirmBox.querySelector('#submitPaymentBtn').addEventListener('click', async () => {
    confirmBox.querySelector('#submitPaymentBtn').textContent = 'Processing...';
    confirmBox.querySelector('#submitPaymentBtn').disabled = true;
    
    try {
      const token = localStorage.getItem('auth_token');
      if (!token) {
        showToast('Not authenticated', '#ef4444');
        confirmOverlay.remove();
        return;
      }
      
      // Send payment confirmation to backend
      const response = await fetch('https://nexusbackend-vpu0.onrender.com/api/payment-confirm', {
        method: 'POST',
        headers: {
          'Content-Type': 'application/json',
          'Authorization': `Bearer ${token}`
        },
        body: JSON.stringify({
          method: method,
          wallet_address: address,
          amount_usd: parseFloat(amount)
        })
      });
      
      if (!response.ok) {
        const error = await response.json();
        showToast(error.error || 'Payment submission failed', '#ef4444');
        confirmOverlay.remove();
        return;
      }
      
      confirmOverlay.remove();
      showToast('Payment submitted! Awaiting admin confirmation.', '#10b981');
    } catch (error) {
      console.error('Payment error:', error);
      showToast('Error submitting payment', '#ef4444');
      confirmOverlay.remove();
    }
  });
  
  confirmOverlay.addEventListener('click', (e) => {
    if (e.target === confirmOverlay) confirmOverlay.remove();
  });
  
  lucide.createIcons();
}
